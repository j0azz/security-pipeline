name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "the name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: echo "${{ github.repository }} repository has been cloned to the runner."
      - run: echo "workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "job's status is ${{ job.status }}."
  
  SAST:
    uses: j0azz/security-pipeline/.github/workflows/codeql.yml@main
    actions: read
    security-events: write
  
  iac-checkov:
    name: IaC Security - Checkov
    runs-on: ubuntu-latest
    needs: SAST

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,cloudformation
          soft_fail: true
  DAST:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: SAST

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start application
        run: |

          # Docker Compose
          if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
            docker compose up -d

          # Node.js app
          elif [ -f package.json ]; then
            npm ci
            npm run start &

          # Python app
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            python app.py &

          # Java Maven app
          elif [ -f pom.xml ]; then
            mvn spring-boot:run &

          # Java Gradle app
          elif [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew bootRun &

          else
            echo "No supported application startup method found"
            exit 1
          fi

      - name: Wait for application startup
        run: |
          echo "Waiting for app..."
          sleep 45

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
  SCA:
    name: SCA - Dependency Review
    runs-on: ubuntu-latest
    needs: SAST
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
      
